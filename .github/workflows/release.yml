name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: SindarinSDK/sindarin-pipelines/.github/workflows/sindarin-lib-release.yml@main
    secrets: inherit
    with:
      package-name: sindarin-postgres
      apt-packages: "gperf flex bison perl"
      brew-packages: "gperf flex bison"
